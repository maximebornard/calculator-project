stages:
  - lint
  - test
  - build
  - publish

default:
  image: python:3.10
  cache:
    paths:
      - .cache/pip
      - .venv/

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  VENV_DIR: ".venv"

before_script:
  - python --version
  - python -m venv $VENV_DIR
  - . $VENV_DIR/bin/activate
  - python -m pip install --upgrade pip

# --------------------
# CI: lint / format
# --------------------
lint:
  stage: lint
  script:
    - . $VENV_DIR/bin/activate
    - pip install ruff
    - ruff check .
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event"

format_check:
  stage: lint
  script:
    - . $VENV_DIR/bin/activate
    - pip install black
    - black --check .
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event"

# --------------------
# CI: tests
# --------------------
tests:
  stage: test
  script:
    - . $VENV_DIR/bin/activate
    - pip install -e ".[test]"
    - pytest -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event"

# --------------------
# Build artefacts
# --------------------
build:
  stage: build
  script:
    - . $VENV_DIR/bin/activate
    - pip install build
    - python -m build
  artifacts:
    when: always
    paths:
      - dist/*
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_TAG

# --------------------
# CD: publish to TestPyPI on tag vX.Y.Z
# --------------------
publish_testpypi:
  stage: publish
  needs: ["build"]
  script:
    - . $VENV_DIR/bin/activate
    - pip install twine
    - python -m twine upload --repository-url https://test.pypi.org/legacy/ -u "__token__" -p "$TESTPYPI_API_TOKEN" dist/*
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: on_success