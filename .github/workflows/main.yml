name: CI/CD

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]

jobs:
  # -------------------------
  # CI: Qualité + Tests
  # -------------------------
  quality-and-tests:
    name: quality-and-tests
    runs-on: ubuntu-latest

    steps:
      # 1) Récupère le code du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Installe Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3) Installe ton projet + dépendances de test
      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      # 4) Vérifie le formatage (ne modifie pas)
      - name: Check formatting (black)
        run: |
          black --check .

      # 5) Lint (pylint)
      - name: Lint (pylint)
        run: |
          pylint src/calculator/simple_calculator.py
          pylint tests/test_simple_calculator.py

      # 6) Complexité (radon)
      - name: Complexity (radon)
        run: |
          radon cc src -a

      # 7) Tests + couverture
      - name: Run tests (pytest + coverage)
        run: |
          pytest --cov=calculator

  # -------------------------
  # CD: Build + Artifact + Publish TestPyPI
  # (se lance seulement sur tag v*)
  # -------------------------
  build-and-publish-testpypi:
    name: build-and-publish-testpypi
    runs-on: ubuntu-latest
    needs: quality-and-tests
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      # 1) Récupère le code du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Installe Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3) Installe les outils de build + upload
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      # 4) Build (wheel + sdist)
      - name: Build package (sdist + wheel)
        run: |
          python -m build

      # 5) Vérifie que les distributions sont valides
      - name: Check distributions (twine check)
        run: |
          twine check dist/*

      # 6) ✅ Crée un artefact GitHub avec le dossier dist/
      - name: Upload dist/ as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

      # 7) ✅ Publie sur TestPyPI
      - name: Publish to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          twine upload --repository-url https://test.pypi.org/legacy/ dist/*