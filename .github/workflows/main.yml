name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest

    steps:
      # 1) Récupère le code du dépôt dans la machine GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Installe la version de Python voulue (ici 3.10)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3) Met à jour pip et installe ton projet + dépendances de test
      #    -e .[test] installe le package en mode "editable" + pytest/pylint/black/radon/pytest-cov
      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      # 4) Vérifie que le code est bien formaté (ne modifie pas, juste contrôle)
      - name: Check formatting (black)
        run: |
          black --check .

      # 5) Analyse statique (qualité / conventions) sur tes fichiers principaux
      - name: Lint (pylint)
        run: |
          pylint src/calculator/simple_calculator.py
          pylint tests/test_simple_calculator.py

      # 6) Mesure de complexité (info utile pour un TP)
      - name: Complexity (radon)
        run: |
          radon cc src -a

      # 7) Lance les tests + mesure de couverture
      - name: Run tests (pytest + coverage)
        run: |
          pytest --cov=calculator
